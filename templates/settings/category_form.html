{% extends "base.html" %}

{% block title %}{{ '編輯分類' if category else '新增分類' }}{% endblock %}
{% block header %}{{ '編輯資產分類' if category else '新增資產分類' }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card glass-card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">分類代碼 <span class="text-danger">*</span></label>
                        <input type="text" name="code" class="form-control"
                            value="{{ category.code if category else '' }}" required>
                        <div class="form-text">例如：IT-HW, OFFICE-FURNITURE</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">分類名稱 <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control"
                            value="{{ category.name if category else '' }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">折舊年限 (年)</label>
                        <input type="number" name="depreciation_years" class="form-control"
                            value="{{ category.depreciation_years if category else '0' }}" min="0">
                        <div class="form-text">若不計算折舊請填 0</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">上層分類</label>
                        <select name="parent_id" class="form-select">
                            <option value="">-- 無 (設為頂層分類) --</option>
                            {% for cat in categories %}
                            <option value="{{ cat.id }}" {{ 'selected' if category and category.parent_id==cat.id
                                else '' }}>
                                {{ cat.name }} ({{ cat.code }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-between pt-3 border-top">
                        <a href="{{ url_for('settings.category_list') }}" class="btn btn-light border px-4">取消</a>
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fas fa-save me-2"></i>儲存設定
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
