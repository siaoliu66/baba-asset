{% extends "base.html" %}
{% block title %}{{ '編輯' if person else '新增' }}人員{% endblock %}
{% block header %}{{ '編輯' if person else '新增' }}人員{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card glass-card border-0 shadow-sm p-4">
            <form
                action="{{ url_for('settings.personnel_edit', id=person.id) if person else url_for('settings.personnel_create') }}"
                method="POST">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">姓名 <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" value="{{ person.name if person else '' }}"
                            required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">員工編號</label>
                        <input type="text" name="employee_id" class="form-control"
                            value="{{ person.employee_id if person else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">電子信箱</label>
                        <input type="email" name="email" class="form-control"
                            value="{{ person.email if person else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">電話</label>
                        <input type="text" name="phone" class="form-control"
                            value="{{ person.phone if person else '' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">所屬部門</label>
                        <select name="department_id" class="form-select">
                            <option value="">-- 請選擇 --</option>
                            {% for d in departments %}
                            <option value="{{ d.id }}" {% if person and person.department_id==d.id %}selected{% endif
                                %}>{{ d.display_name or d.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">職位</label>
                        <input type="text" name="position" class="form-control"
                            value="{{ person.position if person else '' }}">
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox" name="is_active" class="form-check-input" id="isActive" {{ 'checked'
                                if (person and person.is_active) or not person else '' }}>
                            <label class="form-check-label" for="isActive">在職中</label>
                        </div>
                    </div>

                    <!-- Quick Account Creation Section -->
                    {% if not person %}
                    <div class="col-12">
                        <hr class="opacity-10">
                        <div class="card bg-light border-0 p-3">
                            <div class="form-check mb-3">
                                <input type="checkbox" name="create_account" class="form-check-input"
                                    id="createAccount">
                                <label class="form-check-label fw-bold" for="createAccount">
                                    <i class="fas fa-user-plus me-1 text-primary"></i>同時建立系統帳號
                                </label>
                            </div>
                            <div id="accountFields" style="display: none;">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">登入帳號</label>
                                        <input type="text" name="username" class="form-control"
                                            placeholder="例: john.doe">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">初始密碼</label>
                                        <input type="password" name="password" class="form-control" placeholder="至少6位">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">角色權限</label>
                                        <select name="role_id" class="form-select">
                                            <option value="">-- 請選擇角色 --</option>
                                            {% for r in roles %}
                                            <option value="{{ r.id }}">{{ r.display_name }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    {% endif %}

                    <div class="col-12 mt-4">
                        <hr class="opacity-10 mb-4">
                        <div class="d-flex justify-content-between">
                            <a href="{{ url_for('settings.personnel_list') }}" class="btn btn-light border px-4"><i
                                    class="fas fa-arrow-left me-2"></i>返回列表</a>
                            <button type="submit" class="btn btn-primary px-5"><i
                                    class="fas fa-save me-2"></i>儲存</button>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const createAccountCheckbox = document.getElementById('createAccount');
        const accountFields = document.getElementById('accountFields');

        if (createAccountCheckbox && accountFields) {
            createAccountCheckbox.addEventListener('change', function () {
                accountFields.style.display = this.checked ? 'block' : 'none';
            });
        }
    });
</script>
{% endblock %}
